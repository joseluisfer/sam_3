name: Desplegar SAM 3 a Docker Hub

# Esto hace que la acción se ejecute automáticamente cada vez que hagas un push
on:
  push:
    branches:
      - main  # Cambia esto si tu rama principal se llama 'master'

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    
    steps:
      - name: Descargar el código del repositorio
        uses: actions/checkout@v3

      - name: Iniciar sesión en Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Construir y Subir imagen (Build & Push)
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          # Esto etiquetará tu imagen como tu_usuario/sam3-runpod:latest
          tags: ${{ secrets.DOCKER_USERNAME }}/sam3-runpod:latest
          # Aquí inyectamos de forma segura tu token de Hugging Face al Dockerfile
          build-args: |
            HF_TOKEN=${{ secrets.HF_TOKEN }}
